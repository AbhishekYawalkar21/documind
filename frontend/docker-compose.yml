version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: documind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: documind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documind-network

  ollama:
    image: ollama/ollama:latest
    container_name: documind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    networks:
      - documind-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/documind
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - documind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - documind-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  documind-network:
    driver: bridge